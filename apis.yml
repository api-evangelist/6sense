aid: 6sense
url: https://raw.githubusercontent.com/api-evangelist/6sense/refs/heads/main/apis.yml
apis:
- aid: 6sense:6sense-company-identification-api
  name: 6sense Company Identification API
  tags:
  - ABM
  - Intent
  - Web Deanonymization
  - B2B
  humanURL: https://api.6sense.com/docs/
  properties:
  - url: https://api.6sense.com/docs/
    type: Documentation
  - url: https://support.6sense.com/docs/6sense-api-overview
    type: Documentation
  - url: openapi/6sense-company-identification-api-openapi.yml
    type: OpenAPI
  - url: json-schema/6sense-company-schema.json
    type: JSONSchema
  - url: json-schema/6sense-score-schema.json
    type: JSONSchema
  - url: json-ld/6sense-context.jsonld
    type: JSONLD
  - url: graphql/6sense-graphql.md
    type: GraphQL
  description: Identify a company from a visitor IP address and return firmographics,
    product-level intent scoring, buying stage, profile fit, 6QA flag, and segment
    membership. Powers 6sense's web deanonymization use case.
- aid: 6sense:6sense-company-firmographics-api
  name: 6sense Company Firmographics API
  tags:
  - ABM
  - Firmographics
  - Enrichment
  humanURL: https://api.6sense.com/docs/
  properties:
  - url: https://api.6sense.com/docs/
    type: Documentation
  - url: openapi/6sense-company-firmographics-api-openapi.yml
    type: OpenAPI
  - url: json-schema/6sense-company-schema.json
    type: JSONSchema
  description: Enrich a company by email or domain. Returns industry, employee and
    revenue ranges, SIC/NAICS classification, address, and segment membership.
- aid: 6sense:6sense-lead-scoring-api
  name: 6sense Lead Scoring API
  tags:
  - ABM
  - Scoring
  - Intent
  - Predictive Analytics
  humanURL: https://api.6sense.com/docs/
  properties:
  - url: https://api.6sense.com/docs/
    type: Documentation
  - url: openapi/6sense-lead-scoring-api-openapi.yml
    type: OpenAPI
  - url: json-schema/6sense-score-schema.json
    type: JSONSchema
  description: Returns predictive product-level scoring for a contact — company intent
    score and buying stage, profile fit, contact-level intent score, and contact grade
    — driven by 6sense's predictive analytics models.
- aid: 6sense:6sense-lead-scoring-firmographics-api
  name: 6sense Lead Scoring And Firmographics API
  tags:
  - ABM
  - Scoring
  - Firmographics
  - Intent
  humanURL: https://api.6sense.com/docs/
  properties:
  - url: https://api.6sense.com/docs/
    type: Documentation
  - url: openapi/6sense-lead-scoring-firmographics-api-openapi.yml
    type: OpenAPI
  description: Combined endpoint that returns firmographic enrichment, predictive
    scoring, and segment membership for a contact in a single response.
- aid: 6sense:6sense-people-enrichment-api
  name: 6sense People Enrichment API
  tags:
  - Enrichment
  - People
  - Contacts
  - B2B
  humanURL: https://api.6sense.com/docs/
  properties:
  - url: https://api.6sense.com/docs/
    type: Documentation
  - url: openapi/6sense-people-enrichment-api-openapi.yml
    type: OpenAPI
  - url: json-schema/6sense-contact-schema.json
    type: JSONSchema
  description: Batch enrich up to 25 contact records per request keyed by email, LinkedIn
    URL, or 6sense peopleId. Returns rich profile data (job, location, skills, education)
    and embedded company firmographics. Up to 20 QPS per customer.
- aid: 6sense:6sense-people-search-api
  name: 6sense People Search API
  tags:
  - Search
  - People
  - Contacts
  humanURL: https://api.6sense.com/docs/
  properties:
  - url: https://api.6sense.com/docs/
    type: Documentation
  - url: openapi/6sense-people-search-api-openapi.yml
    type: OpenAPI
  description: Search contacts at a target company by domain with optional job-title,
    function, level, location, and industry filters. Includes a dictionary endpoint
    exposing valid filter values.
