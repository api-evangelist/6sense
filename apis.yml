solutions:
- name: AI-Powered Account-Based Marketing
  description: Identify in-market accounts, orchestrate omnichannel ABM campaigns,
    and prioritize the accounts most likely to buy using 6AI and the Signalverse intent
    graph.
- name: Web Deanonymization
  description: Resolve anonymous website visitors to companies and surface buying-stage
    signals via the Company Identification API.
- name: Predictive Lead And Account Scoring
  description: Real-time predictive scoring of leads and accounts against product-specific
    buying journeys via the Lead Scoring APIs.
- name: B2B Data Enrichment
  description: Bulk and on-demand enrichment of accounts and contacts using firmographic,
    technographic, and contact intelligence via the Company and People Enrichment
    APIs.
- name: Revenue Marketing Automation
  description: AI Email Agents, Audience Builder, Digital Advertising, and Intelligent
    Workflows that act on Signalverse signals across the funnel.
- name: Sales Intelligence
  description: Sales Copilot, Account Prioritization, List Builder, Sales Alerts,
    Company and People Search, and the Chrome Extension surface the right account
    and contact at the right moment.
