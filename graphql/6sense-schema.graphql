}

"""Ad units associated with a campaign."""
type CampaignAds {
  campaignId: ID!
  ads: [AdDetails]
  totalAds: Int
  activeAds: Int
}

"""Impression metrics for a campaign."""
type CampaignImpressions {
  campaignId: ID!
  totalImpressions: Int
  uniqueAccountsReached: Int
  avgFrequency: Float
  impressionsByDate: [JSON]
  impressionsBySegment: [JSON]
}

"""Click metrics for a campaign."""
type CampaignClicks {
  campaignId: ID!
  totalClicks: Int
  uniqueClicks: Int
  ctr: Float
  clicksByDate: [JSON]
  clicksByAd: [JSON]
}

"""Individual ad creative with performance metrics."""
type AdDetails {
  id: ID!
  campaignId: ID!
  name: String
  format: String
  width: Int
  height: Int
  imageUrl: String
  destinationUrl: String
  impressions: Int
  clicks: Int
  ctr: Float
  spend: Float
  status: String
