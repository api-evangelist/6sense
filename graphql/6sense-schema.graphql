# ---------------------------------------------------------------------------
# Input Types
# ---------------------------------------------------------------------------

input ContactFilterInput {
  jobFunctions: [String]
  levels: [String]
  locations: [String]
  industries: [String]
  limit: Int
  offset: Int
}

input SegmentInput {
  name: String!
  type: SegmentTypeEnum!
  description: String
  filters: JSON
  includedSegments: [ID]
  excludedSegments: [ID]
  autoRefresh: Boolean
}

input CampaignInput {
  name: String!
  objective: String
  startDate: DateTime
  endDate: DateTime
  budget: Float
  targetSegments: [ID]
  excludedSegments: [ID]
  geographies: [String]
}

input SuppressionInput {
  suppressionId: ID
  domain: String
  accountId: ID
  reason: String
  expiresAt: DateTime
}

# ---------------------------------------------------------------------------
# Query Root
# ---------------------------------------------------------------------------

type Query {
  """Resolve and enrich an account by IP address or domain."""
  account(ip: String, domain: String): Account

  """Fetch intent signals and buying stage for an account."""
  accountIntent(domain: String!, product: String): AccountIntent

  """Fetch buying stage classification for an account and product."""
  buyingStage(domain: String!, product: String!): BuyingStage

  """Fetch an enriched contact by email, LinkedIn URL, or 6sense peopleId."""
  contact(email: String, linkedinUrl: String, peopleId: String): Contact

  """Batch-enrich up to 25 contacts."""
  contacts(inputs: [JSON!]!): [Contact]

  """Search contacts at a company domain with optional filters."""
  searchContacts(domain: String!, filters: ContactFilterInput): [Contact]

  """Fetch a segment definition."""
  segment(id: ID!): Segment

  """List all segments."""
  segments: [Segment]

  """Fetch segment members."""
  segmentMembers(segmentId: ID!, limit: Int, offset: Int): [SegmentMember]

  """Fetch a campaign with metrics."""
  campaign(id: ID!): Campaign

  """List campaigns."""
  campaigns(status: CampaignStatusEnum): [Campaign]

  """Fetch predictive score for a contact or account."""
  prediction(domain: String, contactEmail: String, product: String!): Prediction

  """Fetch a report by ID."""
  report(id: ID!): Report

  """List reports."""
  reports(type: ReportTypeEnum): [Report]

  """Fetch an intent topic."""
  topic(id: ID!): Topic

  """List intent topics."""
  topics: [Topic]

  """Fetch keyword research data."""
  keywordResearch(keyword: String!): KeywordResearch

  """Fetch an audience."""
  audience(id: ID!): Audience

  """List audiences."""
  audiences: [Audience]

  """Fetch team details."""
  team(id: ID!): Team

  """List integrations."""
  integrations: [Integration]

  """List API keys for the current team."""
  apiKeys: [APIKey]

  """Fetch suppression list."""
  suppression(id: ID!): Suppression

  """List suppression lists."""
  suppressions: [Suppression]
}

# ---------------------------------------------------------------------------
# Mutation Root
# ---------------------------------------------------------------------------

type Mutation {
  """Create a new segment."""
  createSegment(input: SegmentInput!): Segment

  """Update an existing segment."""
  updateSegment(id: ID!, input: SegmentInput!): Segment

  """Delete a segment."""
  deleteSegment(id: ID!): Boolean

  """Create a new campaign."""
  createCampaign(input: CampaignInput!): Campaign

  """Update an existing campaign."""
  updateCampaign(id: ID!, input: CampaignInput!): Campaign

  """Pause a campaign."""
  pauseCampaign(id: ID!): Campaign

  """Resume a paused campaign."""
  resumeCampaign(id: ID!): Campaign

  """Add an account to a suppression list."""
  addSuppression(input: SuppressionInput!): SuppressedAccount

  """Remove an account from a suppression list."""
  removeSuppression(suppressionId: ID!, domain: String!): Boolean

  """Generate a new API key."""
  createAPIKey(name: String!, scopes: [String]): APIKey

  """Revoke an API key."""
  revokeAPIKey(id: ID!): Boolean
}
