# ---------------------------------------------------------------------------
# Campaign Types
# ---------------------------------------------------------------------------

"""ABM advertising or nurture campaign."""
type Campaign {
  id: ID!
  name: String!
  status: CampaignStatusEnum
  objective: String
  startDate: DateTime
  endDate: DateTime
  budget: Float
  spend: Float
  impressions: Int
  clicks: Int
  reach: Int
  details: CampaignDetails
  ads: [AdDetails]
  impressionMetrics: CampaignImpressions
  clickMetrics: CampaignClicks
}

"""Targeting, budget, schedule, and creative configuration for a campaign."""
type CampaignDetails {
  campaignId: ID!
  targetSegments: [Segment]
  excludedSegments: [Segment]
  geographies: [String]
  industries: [String]
  jobFunctions: [String]
  levels: [String]
  dailyBudgetCap: Float
  bidStrategy: String
  frequency: String
  creativeTypes: [String]
  landingPageUrl: String
