"""
6sense Revenue AI Platform — Conceptual GraphQL Schema
Derived from the 6sense REST API documentation at https://docs.6sense.com/ and https://api.6sense.com/docs/
Covers: account identification, intent data, firmographic/technographic enrichment,
predictive scoring, segmentation, campaigns, people enrichment, and integrations.
"""

# ---------------------------------------------------------------------------
# Scalars
# ---------------------------------------------------------------------------

scalar DateTime
scalar JSON

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

enum BuyingStageEnum {
  TARGET
  AWARENESS
  CONSIDERATION
  DECISION
  PURCHASE
}

enum IntentStageEnum {
  AWARENESS
  CONSIDERATION
  DECISION
}

enum ContactLevelEnum {
  IC
  MANAGER
  DIRECTOR
  VP
  C_SUITE
  FOUNDER
}

enum CampaignStatusEnum {
  DRAFT
  ACTIVE
  PAUSED
  COMPLETED
  ARCHIVED
}

enum VerificationStatusEnum {
  VERIFIED
  UNVERIFIED
  RISKY
  INVALID
  UNKNOWN
}

enum SegmentTypeEnum {
  ACCOUNT
  CONTACT
  DYNAMIC
  STATIC
}

enum IntegrationTypeEnum {
  SALESFORCE
  HUBSPOT
  MARKETO
  ELOQUA
  PARDOT
  MICROSOFT_DYNAMICS
  LINKEDIN
  SLACK
  OUTREACH
  SALESLOFT
  SEGMENT
  SNOWFLAKE
  OTHER
}

enum ReportTypeEnum {
  INTENT
  CAMPAIGN_PERFORMANCE
  ATTRIBUTION
  SEGMENT_ACTIVITY
  PIPELINE
}

# ---------------------------------------------------------------------------
# Account Types
# ---------------------------------------------------------------------------

"""Core company record resolved from an IP address or domain."""
type Account {
  id: ID!
  name: String
  domain: String
  ip: String
  country: String
  state: String
  city: String
  industry: String
  employeeRange: String
  revenueRange: String
  isAnonymous: Boolean
  is6QA: Boolean
  buyingStage: BuyingStageEnum
  score: AccountScore
  profile: AccountProfile
  intent: AccountIntent
  segments: [Segment]
  keywords: [AccountKeyword]
  details: AccountDetails
  updatedAt: DateTime
}

"""Extended account metadata including enrichment and identification fields."""
type AccountDetails {
  id: ID!
  accountId: ID!
  naicsCode: String
  sicCode: String
  annualRevenue: Float
  employeeCount: Int
  foundedYear: Int
  stockTicker: String
  stockExchange: String
  linkedinUrl: String
  twitterHandle: String
  phone: String
  address: String
  postalCode: String
  countryCode: String
  technographics: [CompanyTechnographic]
  firmographic: CompanyFirmographic
}

"""Aggregated sentiment signals for an account."""
type AccountSentiment {
  accountId: ID!
  domain: String
  overallSentiment: Float
  positiveMentions: Int
  negativeMentions: Int
  neutralMentions: Int
  topics: [Topic]
  computedAt: DateTime
}

"""Product-level intent and fit scores for an account."""
type AccountScore {
  accountId: ID!
  product: String
  intentScore: Float
  profileScore: Float
  combinedScore: Float
  grade: String
  percentile: Int
  modelVersion: String
  scoredAt: DateTime
}

"""Ideal customer profile fit assessment for an account."""
type AccountProfile {
  accountId: ID!
  product: String
  fitScore: Float
  fitGrade: String
  matchedCriteria: [String]
  missedCriteria: [String]
  icp: Boolean
}

"""Keyword-level intent signals for an account."""
type AccountKeyword {
  accountId: ID!
  keyword: String!
  volume: Int
  trend: Float
  firstSeenAt: DateTime
  lastSeenAt: DateTime
  topics: [Topic]
}

"""Aggregated intent activity for an account."""
type AccountIntent {
  accountId: ID!
  domain: String
  product: String
  intentScore: Float
  buyingStage: BuyingStageEnum
  signals: [IntentSignal]
  topics: [Topic]
  weeklyTrend: Float
  computedAt: DateTime
}

# ---------------------------------------------------------------------------
# Intent Types
# ---------------------------------------------------------------------------

"""Detailed intent topic and signal breakdown."""
type IntentDetails {
  id: ID!
  accountId: ID
  domain: String
  product: String
  topics: [TopicDetails]
  signals: [IntentSignal]
  totalSignals: Int
  intentScore: Float
  buyingStage: BuyingStageEnum
  period: String
  computedAt: DateTime
}

"""Individual intent event or research signal."""
type IntentSignal {
  id: ID!
  accountId: ID
  domain: String
  keyword: String
  topic: String
  source: String
  signalType: String
  volume: Int
  date: DateTime
  country: String
  stage: IntentStageEnum
}

"""Numeric intent score with scoring context."""
type IntentScore {
  accountId: ID
  contactId: ID
  product: String
  score: Float
  grade: String
  percentile: Int
  trend: Float
  buyingStage: BuyingStageEnum
  scoredAt: DateTime
}

"""Multi-product intent profile across topics for an account or contact."""
type IntentProfile {
  id: ID!
  accountId: ID
  products: [IntentScore]
  topTopics: [TopicSignal]
  aggregateScore: Float
  computedAt: DateTime
}

"""Stage of intent journey for a prospect."""
type IntentStage {
  id: ID!
  accountId: ID!
  product: String
  stage: IntentStageEnum
  enteredAt: DateTime
  daysInStage: Int
  previousStage: IntentStageEnum
}

"""6sense buying stage classification for an account."""
type BuyingStage {
  accountId: ID!
  product: String
  stage: BuyingStageEnum
  confidence: Float
  enteredAt: DateTime
  predictedCloseDate: DateTime
}

# ---------------------------------------------------------------------------
# Segment Types
# ---------------------------------------------------------------------------

"""Named account or contact segment."""
type Segment {
  id: ID!
  name: String!
  type: SegmentTypeEnum
  description: String
  memberCount: Int
  accountCount: Int
  contactCount: Int
  isActive: Boolean
  createdAt: DateTime
  updatedAt: DateTime
  details: SegmentDetails
}

"""Segment configuration, filters, and counts."""
type SegmentDetails {
  segmentId: ID!
  filters: JSON
  includedSegments: [ID]
  excludedSegments: [ID]
  autoRefresh: Boolean
  refreshFrequency: String
  lastRefreshedAt: DateTime
  estimatedReach: Int
}

"""Account or contact membership record in a segment."""
type SegmentMember {
  segmentId: ID!
  memberId: ID!
  memberType: String
  domain: String
  addedAt: DateTime
  source: String
}

